services:

  tuya-poller:
    image: kelvinvalencio/tuya-poller-prometheus:latest
    container_name: tuya-poller
    restart: unless-stopped
    env_file: .env
    network_mode: host
    healthcheck:
      test: ["CMD", "python", "-c",
             "import os, urllib.request; urllib.request.urlopen(f'http://localhost:{os.environ[\"METRICS_PORT\"]}/metrics')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
      